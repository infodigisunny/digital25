<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#222233" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Main large gear -->
  <circle cx="26" cy="26" r="10"/>
  <circle cx="26" cy="26" r="4"/>
  <!-- Gear teeth (8 teeth) -->
  <line x1="26" y1="12" x2="26" y2="16"/>
  <line x1="26" y1="36" x2="26" y2="40"/>
  <line x1="12" y1="26" x2="16" y2="26"/>
  <line x1="36" y1="26" x2="40" y2="26"/>
  <line x1="16.1" y1="16.1" x2="19" y2="19"/>
  <line x1="33" y1="33" x2="35.9" y2="35.9"/>
  <line x1="35.9" y1="16.1" x2="33" y2="19"/>
  <line x1="19" y1="33" x2="16.1" y2="35.9"/>
  <!-- Small gear bottom right -->
  <circle cx="46" cy="46" r="7"/>
  <circle cx="46" cy="46" r="3"/>
  <line x1="46" y1="37" x2="46" y2="39.5"/>
  <line x1="46" y1="52.5" x2="46" y2="55"/>
  <line x1="37" y1="46" x2="39.5" y2="46"/>
  <line x1="52.5" y1="46" x2="55" y2="46"/>
  <line x1="40.1" y1="40.1" x2="42" y2="42"/>
  <line x1="50" y1="50" x2="51.9" y2="51.9"/>
  <line x1="51.9" y1="40.1" x2="50" y2="42"/>
  <line x1="42" y1="50" x2="40.1" y2="51.9"/>
  <!-- Connecting link between gears -->
  <line x1="34" y1="34" x2="39" y2="39" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- Wrench small top right -->
  <path d="M44 14 C42 10 46 7 49 9 L47 11 L50 14 L48 16 L45 13 Z" fill="none" stroke-width="1.6"/>
  <line x1="50" y1="14" x2="56" y2="20" stroke-width="2.2"/>
</svg>

  <line x1="22" y1="33" x2="22" y2="21" stroke-width="2"/>
  <line x1="27" y1="33" x2="27" y2="24" stroke-width="2"/>
  <line x1="32" y1="33" x2="32" y2="18" stroke-width="2"/>
  <!-- Chart base line -->
  <line x1="15" y1="34" x2="35" y2="34" stroke-width="1.5"/>
  <!-- Trend arrow up-right -->
  <polyline points="17,27 22,21 27,24 32,18" stroke-width="1.5" stroke="#222233"/>
